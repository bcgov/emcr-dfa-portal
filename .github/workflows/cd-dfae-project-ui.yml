name: cd-dfae-portal-project-ui

on:
  push:
    branches:
      - 'feature/workflows'

    paths:
      - "dfa/src/UI/**"
      - ".github/workflows/cd-dfa-portal-project-ui.yml"
  workflow_dispatch:
env:
  IMAGE_NAME: dfa-portal-ui
  WORKING_DIRECTORY: ./dfa/src/UI

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - name: Log into registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.DOCKER_PROJECT_REGISTRY }}
          username: ${{ secrets.DOCKER_PROJECT_USERNAME }}
          password: ${{ secrets.DOCKER_PROJECT_PASSWORD_BUILDER }}

      - name: Build Image
        working-directory: ${{env.WORKING_DIRECTORY}}
        run: |
          docker build -t ${{env.IMAGE_NAME}} .
          docker images

      - name: Tag Image
        run: |
          docker tag ${{env.IMAGE_NAME}} ${{ secrets.DOCKER_PROJECT_REGISTRY }}/${{env.IMAGE_NAME}}:dev
